<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSales — Agendar Demonstração</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --roxo:#5B3FD9; --roxo-v:#6B4DE6; --roxo-esc:#4A32B0;
  --lavanda:#C4B5F4; --lav-s:#EDE8FB;
  --preto:#1A1A2E; --corpo:#585770; --linha:#E8E4F5; --alto:#2A1A72;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  overflow:hidden;
}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(500px 300px at 100% 0%,var(--lav-s),transparent 60%),
             radial-gradient(400px 250px at 0% 80%,oklch(0.97 0.015 285),transparent 55%),#fff;
  color:var(--preto);
  -webkit-font-smoothing:antialiased;
}

/* CONTAINER — ocupa 100dvh sem scroll */
.container{
  height:100dvh;
  display:flex;
  flex-direction:column;
  padding:20px 20px 16px;
  max-width:720px;
  margin:0 auto;
  width:100%;
}

/* DOC TOP */
.doc-top{
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;margin-bottom:18px;
}
.logo{display:flex;align-items:center;gap:8px;--s:28px;text-decoration:none}
.lm{position:relative;isolation:isolate;display:flex;align-items:center;justify-content:center;gap:calc(var(--s)*.07);width:var(--s);height:var(--s);border-radius:calc(var(--s)*.28);background:var(--roxo);box-shadow:2px 2px 0 var(--alto)}
.lm::after{content:"";position:absolute;z-index:-1;left:14%;bottom:calc(var(--s)*-.04);width:calc(var(--s)*.34);height:calc(var(--s)*.34);background:var(--roxo);border-radius:0 0 0 72%;transform:rotate(8deg)}
.lm .bar{position:relative;z-index:1;width:calc(var(--s)*.16);height:calc(var(--s)*.5);background:#fff;border-radius:calc(var(--s)*.055);box-shadow:0 calc(var(--s)*.055) 0 var(--alto)}
.lm .dot{position:relative;z-index:1;width:calc(var(--s)*.17);height:calc(var(--s)*.17);background:#fff;border-radius:calc(var(--s)*.05);box-shadow:0 calc(var(--s)*.055) 0 var(--alto)}
.lw{font-weight:900;font-size:calc(var(--s)*.74);letter-spacing:-.03em;color:var(--preto)}
.badge{display:inline-flex;align-items:center;background:var(--lav-s);color:var(--roxo);border:1.5px solid var(--lavanda);font-size:10px;font-weight:700;padding:4px 12px;border-radius:100px;text-transform:uppercase;letter-spacing:.06em;box-shadow:2px 2px 0 var(--lavanda)}

/* TÍTULO */
.page-head{flex-shrink:0;text-align:center;margin-bottom:14px}
.page-head h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:900;letter-spacing:-.03em;line-height:1.1}

/* BOTÃO */
.btn-wrap{flex-shrink:0;display:flex;justify-content:center;margin-bottom:14px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:13px 28px;border-radius:14px;font-weight:800;font-size:.95rem;
  background:var(--roxo);color:#fff;text-decoration:none;border:0;
  box-shadow:3px 3px 0 var(--roxo-esc);
  transition:transform .18s var(--ease),box-shadow .18s var(--ease),background .15s;
}
.btn:hover{background:var(--roxo-v);transform:translate(-2px,-2px);box-shadow:5px 5px 0 var(--roxo-esc)}
.btn:active{transform:translate(2px,2px);box-shadow:none}

/* CALENDÁRIO — flex:1 preenche o espaço restante */
.cal-card{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  background:#fff;
  border:2px solid var(--preto);
  border-radius:16px;
  box-shadow:5px 5px 0 var(--roxo);
  overflow:hidden;
}
.cal-head{
  flex-shrink:0;
  background:var(--preto);color:#fff;
  padding:10px 18px;
  display:flex;align-items:center;gap:10px;
}
.dots{display:flex;gap:5px}
.dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25)}
.cal-label{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);margin-left:3px}
.cal-card iframe{
  flex:1;
  width:100%;
  border:none;
  display:block;
}
</style>
</head>
<body>
<div class="container">

  <div class="doc-top">
    <a href="https://hsales.app" class="logo">
      <div class="lm"><div class="bar"></div><div class="dot"></div><div class="bar"></div></div>
      <span class="lw">Sales</span>
    </a>
    <div class="badge">Comercial</div>
  </div>

  <div class="page-head">
    <h1>Agendar Demonstração</h1>
  </div>

  <div class="btn-wrap">
    <a class="btn"
       href="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3C8fspYDefPn-ls9jDUsA8YahzrHhjPPibVLwGFy_0ZQ8js9JYXEMp52BoOC7xd192L-81W57I"
       target="_blank" rel="noopener">
      Agendar demonstração →
    </a>
  </div>

  <div class="cal-card">
    <div class="cal-head">
      <div class="dots"><span></span><span></span><span></span></div>
      <span class="cal-label">Demo HSales — escolha data e horário</span>
    </div>
    <iframe
      src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3C8fspYDefPn-ls9jDUsA8YahzrHhjPPibVLwGFy_0ZQ8js9JYXEMp52BoOC7xd192L-81W57I?gv=true"
      title="Agendamento Demo HSales">
    </iframe>
  </div>

</div>
</body>
</html>
