<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSales — Agendar Demonstração</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --roxo:#5B3FD9; --roxo-v:#6B4DE6; --roxo-esc:#4A32B0;
  --lavanda:#C4B5F4; --lav-s:#EDE8FB;
  --preto:#1A1A2E; --corpo:#585770; --linha:#E8E4F5; --alto:#2A1A72;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  background:radial-gradient(700px 400px at 100% 0%,var(--lav-s),transparent 60%),
             radial-gradient(500px 350px at 0% 70%,oklch(0.97 0.015 285),transparent 55%),#fff;
  color:var(--preto);min-height:100vh;-webkit-font-smoothing:antialiased;
}
.container{max-width:720px;margin:0 auto;padding:40px 20px 72px}

/* DOC TOP */
.doc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px}
.logo{display:flex;align-items:center;gap:10px;--s:32px;text-decoration:none}
.lm{position:relative;isolation:isolate;display:flex;align-items:center;justify-content:center;gap:calc(var(--s)*.07);width:var(--s);height:var(--s);border-radius:calc(var(--s)*.28);background:var(--roxo);box-shadow:2px 2px 0 var(--alto)}
.lm::after{content:"";position:absolute;z-index:-1;left:14%;bottom:calc(var(--s)*-.04);width:calc(var(--s)*.34);height:calc(var(--s)*.34);background:var(--roxo);border-radius:0 0 0 72%;transform:rotate(8deg)}
.lm .bar{position:relative;z-index:1;width:calc(var(--s)*.16);height:calc(var(--s)*.5);background:#fff;border-radius:calc(var(--s)*.055);box-shadow:0 calc(var(--s)*.055) 0 var(--alto)}
.lm .dot{position:relative;z-index:1;width:calc(var(--s)*.17);height:calc(var(--s)*.17);background:#fff;border-radius:calc(var(--s)*.05);box-shadow:0 calc(var(--s)*.055) 0 var(--alto)}
.lw{font-weight:900;font-size:calc(var(--s)*.74);letter-spacing:-.03em;color:var(--preto)}
.badge{display:inline-flex;align-items:center;background:var(--lav-s);color:var(--roxo);border:1.5px solid var(--lavanda);font-size:11px;font-weight:700;padding:5px 14px;border-radius:100px;text-transform:uppercase;letter-spacing:.06em;box-shadow:2px 2px 0 var(--lavanda)}

/* TÍTULO */
.page-head{text-align:center;margin-bottom:28px}
.page-head h1{font-size:clamp(1.8rem,4vw,2.5rem);font-weight:900;letter-spacing:-.03em;line-height:1.1}

/* BOTÃO */
.btn-wrap{display:flex;justify-content:center;margin-bottom:32px}
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:16px 32px;border-radius:14px;font-weight:800;font-size:1rem;
  background:var(--roxo);color:#fff;text-decoration:none;border:0;
  box-shadow:4px 4px 0 var(--roxo-esc);
  transition:transform .18s var(--ease),box-shadow .18s var(--ease),background .15s;
}
.btn:hover{background:var(--roxo-v);transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--roxo-esc)}
.btn:active{transform:translate(2px,2px);box-shadow:none}

/* CALENDÁRIO */
.cal-card{background:#fff;border:2px solid var(--preto);border-radius:16px;box-shadow:6px 6px 0 var(--roxo);overflow:hidden;margin-bottom:20px}
.cal-head{background:var(--preto);color:#fff;padding:12px 20px;display:flex;align-items:center;gap:12px}
.dots{display:flex;gap:6px}
.dots span{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.25)}
.cal-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);margin-left:4px}
.cal-card iframe{display:block;width:100%;min-height:680px;border:none}

/* FOOT */
.foot{text-align:center;font-size:12px;color:var(--corpo)}
.foot a{color:var(--roxo);font-weight:700;text-decoration:none;border-bottom:1.5px solid var(--lavanda)}
.foot a:hover{border-color:var(--roxo)}
</style>
</head>
<body>
<div class="container">

  <div class="doc-top">
    <a href="https://hsales.app" class="logo">
      <div class="lm"><div class="bar"></div><div class="dot"></div><div class="bar"></div></div>
      <span class="lw">Sales</span>
    </a>
    <div class="badge">Comercial</div>
  </div>

  <div class="page-head">
    <h1>Agendar Demonstração</h1>
  </div>

  <div class="btn-wrap">
    <a class="btn"
       href="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3C8fspYDefPn-ls9jDUsA8YahzrHhjPPibVLwGFy_0ZQ8js9JYXEMp52BoOC7xd192L-81W57I"
       target="_blank" rel="noopener">
      Agendar demonstração →
    </a>
  </div>

  <div class="cal-card">
    <div class="cal-head">
      <div class="dots"><span></span><span></span><span></span></div>
      <span class="cal-label">Demo HSales — escolha data e horário</span>
    </div>
    <iframe
      src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3C8fspYDefPn-ls9jDUsA8YahzrHhjPPibVLwGFy_0ZQ8js9JYXEMp52BoOC7xd192L-81W57I?gv=true"
      title="Agendamento Demo HSales">
    </iframe>
  </div>

  <p class="foot">Dúvidas? <a href="https://wa.me/5548996539190?text=Ol%C3%A1!%20Tenho%20d%C3%BAvidas%20sobre%20a%20demo%20da%20HSales." target="_blank" rel="noopener">WhatsApp</a></p>

</div>
</body>
</html>
