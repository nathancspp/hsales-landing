<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSales — Agendar Demonstração</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --roxo:#5B3FD9;--roxo-v:#6B4DE6;--roxo-esc:#4A32B0;
  --lavanda:#C4B5F4;--lav-s:#EDE8FB;
  --preto:#1A1A2E;--corpo:#585770;--linha:oklch(0.92 0.01 285);--alto:#2A1A72;
  --bg:#FBFAFF;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',system-ui,sans-serif;
  color:var(--preto);
  background:radial-gradient(800px 400px at 90% -5%,var(--lav-s),transparent 50%),
             radial-gradient(600px 350px at 0% 30%,oklch(0.96 0.03 290),transparent 52%),
             var(--bg);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
  min-height:100vh;
}
a{color:inherit;text-decoration:none}

/* LAYOUT — mesmo padrão da proposta */
.wrap{max-width:680px;margin:0 auto;padding:40px 20px 60px}

/* DOC TOP */
.doc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.logo{display:flex;align-items:center;gap:10px;--s:32px;text-decoration:none}
.logo-mark{position:relative;isolation:isolate;display:flex;align-items:center;justify-content:center;gap:calc(var(--s)*0.07);width:var(--s);height:var(--s);border-radius:calc(var(--s)*0.28);background:var(--roxo)}
.logo-mark::after{content:"";position:absolute;z-index:-1;left:14%;bottom:calc(var(--s)*-0.04);width:calc(var(--s)*0.34);height:calc(var(--s)*0.34);background:var(--roxo);border-radius:0 0 0 72%;transform:rotate(8deg)}
.logo-mark .bar{position:relative;z-index:1;width:calc(var(--s)*0.16);height:calc(var(--s)*0.5);background:#fff;border-radius:calc(var(--s)*0.055);box-shadow:0 calc(var(--s)*0.055) 0 var(--roxo-esc)}
.logo-mark .dot{position:relative;z-index:1;width:calc(var(--s)*0.17);height:calc(var(--s)*0.17);background:#fff;border-radius:calc(var(--s)*0.05);box-shadow:0 calc(var(--s)*0.055) 0 var(--roxo-esc)}
.logo-word{font-weight:900;font-size:calc(var(--s)*0.74);letter-spacing:-0.03em;line-height:1}
.badge{display:inline-flex;align-items:center;gap:8px;font-size:.75rem;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--roxo);background:var(--lav-s);padding:7px 14px;border-radius:100px;box-shadow:2px 2px 0 var(--lavanda);border:1.5px solid var(--lavanda)}

/* CALENDAR CARD */
.cal-card{
  background:#fff;
  border:2px solid var(--linha);
  border-radius:24px;
  box-shadow:5px 5px 0 var(--lavanda);
  overflow:hidden;
}
.cal-head{
  background:var(--preto);color:#fff;
  padding:12px 20px;
  display:flex;align-items:center;gap:10px;
}
.dots{display:flex;gap:6px}
.dots span{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.25)}
.cal-label{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);margin-left:4px}
.cal-card iframe{display:block;width:100%;min-height:660px;border:none}

footer{text-align:center;color:var(--corpo);font-size:.82rem;padding-top:24px}
</style>
</head>
<body>
<main class="wrap">

  <div class="doc-top">
    <a class="logo" href="https://hsales.app" target="_blank" rel="noreferrer">
      <span class="logo-mark"><span class="bar"></span><span class="dot"></span><span class="bar"></span></span>
      <span class="logo-word">Sales</span>
    </a>
    <span class="badge">Agendar demonstração</span>
  </div>

  <div class="cal-card">
    <div class="cal-head">
      <div class="dots"><span></span><span></span><span></span></div>
      <span class="cal-label">Demo HSales — escolha data e horário</span>
    </div>
    <iframe
      src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3C8fspYDefPn-ls9jDUsA8YahzrHhjPPibVLwGFy_0ZQ8js9JYXEMp52BoOC7xd192L-81W57I?gv=true"
      title="Agendamento Demo HSales">
    </iframe>
  </div>

  <footer>HSales · hsales.app</footer>

</main>
</body>
</html>
