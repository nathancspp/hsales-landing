<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HSales — Agendar Demonstração</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --roxo:     #5B3FD9;
  --roxo-v:   #6B4DE6;
  --roxo-esc: #4A32B0;
  --lavanda:  #C4B5F4;
  --lav-s:    #EDE8FB;
  --preto:    #1A1A2E;
  --corpo:    #585770;
  --linha:    #E8E4F5;
  --alto:     #2A1A72;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: #F7F6FF;
  color: var(--preto);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ─────────────────────────────────── */
.header {
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(14px);
  border-bottom: 2px solid var(--linha);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { display: flex; align-items: center; gap: 10px; --s: 44px; text-decoration: none; }
.lm {
  position: relative; isolation: isolate;
  display: flex; align-items: center; justify-content: center;
  gap: calc(var(--s)*.07);
  width: var(--s); height: var(--s);
  border-radius: calc(var(--s)*.28); background: var(--roxo);
}
.lm::after {
  content: ""; position: absolute; z-index: -1;
  left: 14%; bottom: calc(var(--s)*-.04);
  width: calc(var(--s)*.34); height: calc(var(--s)*.34);
  background: var(--roxo); border-radius: 0 0 0 72%; transform: rotate(8deg);
}
.lm .bar { position: relative; z-index: 1; width: calc(var(--s)*.16); height: calc(var(--s)*.5); background: #fff; border-radius: calc(var(--s)*.055); box-shadow: 0 calc(var(--s)*.055) 0 var(--alto); }
.lm .dot { position: relative; z-index: 1; width: calc(var(--s)*.17); height: calc(var(--s)*.17); background: #fff; border-radius: calc(var(--s)*.05); box-shadow: 0 calc(var(--s)*.055) 0 var(--alto); }
.lw { font-weight: 900; font-size: calc(var(--s)*.74); letter-spacing: -.03em; color: var(--preto); }
.badge {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--lav-s); color: var(--roxo);
  border: 1.5px solid var(--lavanda);
  font-size: 11px; font-weight: 700;
  padding: 5px 14px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: .06em;
  box-shadow: 2px 2px 0 var(--lavanda);
}
.badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: var(--roxo); }

/* ── BANNER ──────────────────────────────────── */
.banner {
  background: linear-gradient(135deg, var(--roxo) 0%, var(--roxo-v) 100%);
  border-bottom: 2px solid var(--roxo-esc);
  color: #fff; text-align: center; padding: 16px 24px;
}
.banner strong { display: block; font-size: 15px; font-weight: 800; margin-bottom: 3px; }
.banner p { font-size: 13px; opacity: .88; }

/* ── CONTAINER ───────────────────────────────── */
.container { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

/* ── PAGE HEAD ───────────────────────────────── */
.page-head { text-align: center; margin-bottom: 20px; }
.kicker {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--lav-s); color: var(--roxo);
  border: 1.5px solid var(--lavanda);
  font-size: 11px; font-weight: 700;
  padding: 6px 16px; border-radius: 100px;
  text-transform: uppercase; letter-spacing: .06em;
  margin-bottom: 14px;
  box-shadow: 2px 2px 0 var(--lavanda);
}
.page-head h1 {
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  font-weight: 900; letter-spacing: -.03em;
  margin-bottom: 10px;
}
.page-head p { font-size: 14px; color: var(--corpo); max-width: 52ch; margin: 0 auto; line-height: 1.6; }

/* ── INFO CARDS ──────────────────────────────── */
.info-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
@media (max-width: 640px) { .info-grid { grid-template-columns: 1fr; } }
.info-card {
  background: #fff;
  border: 2px solid var(--linha);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 4px 4px 0 var(--lavanda);
  display: flex; gap: 14px; align-items: flex-start;
}
.info-ico {
  font-size: 20px; flex-shrink: 0;
  width: 40px; height: 40px;
  background: var(--lav-s); border: 1.5px solid var(--lavanda);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.info-card h3 { font-size: 13px; font-weight: 800; margin-bottom: 4px; }
.info-card p  { font-size: 12px; color: var(--corpo); line-height: 1.5; }

/* ── CARD IFRAME ─────────────────────────────── */
.cal-card {
  background: #fff;
  border: 2px solid var(--preto);
  border-radius: 16px;
  box-shadow: 6px 6px 0 var(--roxo);
  overflow: hidden;
  margin-bottom: 28px;
}
.cal-card-head {
  background: var(--preto);
  color: #fff;
  padding: 14px 24px;
  display: flex; align-items: center; gap: 12px;
}
.dot-row { display: flex; gap: 6px; }
.dot-row span { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,.25); }
.cal-title { font-size: 13px; font-weight: 700; color: rgba(255,255,255,.85); margin-left: 4px; }
.cal-card iframe { display: block; width: 100%; min-height: 860px; border: none; }

/* ── FOOTER NOTE ─────────────────────────────── */
.footer-note {
  text-align: center;
  background: var(--lav-s);
  border: 2px solid var(--lavanda);
  border-radius: 14px;
  padding: 20px 24px;
  box-shadow: 4px 4px 0 var(--lavanda);
}
.footer-note p { font-size: 13px; color: var(--corpo); line-height: 1.6; }
.footer-note strong { color: var(--preto); }
.footer-note a { color: var(--roxo); font-weight: 700; text-decoration: none; }
.footer-note a:hover { text-decoration: underline; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="https://hsales.app" class="logo">
    <div class="lm"><div class="bar"></div><div class="dot"></div><div class="bar"></div></div>
    <span class="lw">Sales</span>
  </a>
  <div class="badge">Demonstração</div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="page-head">
    <h1>Agende sua demonstração</h1>
    <p>45 min · IA da HSales em operação ao vivo · Google Meet</p>
  </div>

  <div class="cal-card">
    <div class="cal-card-head">
      <div class="dot-row"><span></span><span></span><span></span></div>
      <span class="cal-title">Escolha data e horário — Demo HSales</span>
    </div>
    <!-- Google Calendar Appointment Scheduling -->
    <iframe
      src="https://calendar.google.com/calendar/appointments/schedules/AcZssZ3C8fspYDefPn-ls9jDUsA8YahzrHhjPPibVLwGFy_0ZQ8js9JYXEMp52BoOC7xd192L-81W57I?gv=true"
      width="100%"
      height="860"
      frameborder="0"
      title="Agendamento Demo HSales">
    </iframe>
  </div>

  <p style="text-align:center;font-size:12px;color:var(--corpo);margin-top:16px;">
    Dúvidas? <a href="https://wa.me/5548996539190?text=Ol%C3%A1!%20Tenho%20d%C3%BAvidas%20sobre%20a%20demo%20da%20HSales." target="_blank" rel="noopener" style="color:var(--roxo);font-weight:700;text-decoration:none;">WhatsApp</a>
  </p>

</div>
</body>
</html>
