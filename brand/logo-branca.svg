<svg xmlns="http://www.w3.org/2000/svg" viewBox="-4 -4 340 116" role="img" aria-label="HSales">
  <title>HSales</title>
  <!-- perninha (cauda de chat), atras do icone -->
  <path d="M14 70 H48 V104 H38.5 A24.5 24.5 0 0 1 14 79.5 Z" fill="#5B3FD9" transform="rotate(8 31 87)"/>
  <!-- corpo do botao -->
  <rect x="0" y="0" width="100" height="100" rx="28" fill="#5B3FD9"/>
  <!-- alto-relevo: sombra solida de 1 cor (sem degrade) -->
  <g fill="#2A1A72">
    <rect x="18.5" y="30.5" width="16" height="50" rx="5.5"/>
    <rect x="65.5" y="30.5" width="16" height="50" rx="5.5"/>
    <rect x="41.5" y="47" width="17" height="17" rx="5"/>
  </g>
  <!-- H = 2 hastes + quadradinho no meio -->
  <g fill="#ffffff">
    <rect x="18.5" y="25" width="16" height="50" rx="5.5"/>
    <rect x="65.5" y="25" width="16" height="50" rx="5.5"/>
    <rect x="41.5" y="41.5" width="17" height="17" rx="5"/>
  </g>
  <!-- wordmark branca (para fundo escuro) -->
  <text x="122" y="50" font-family="Inter, 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="900" letter-spacing="-2.2" fill="#ffffff" dominant-baseline="central">Sales</text>
</svg>
